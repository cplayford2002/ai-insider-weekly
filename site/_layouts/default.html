<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <link rel="canonical" href="{% if page.canonical %}{{ page.canonical }}{% else %}{{ page.url | absolute_url }}{% endif %}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:site_name" content="{{ site.title }}" />

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="/feed.xml" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #1a1a1a;
      --muted: #555;
      --border: #e5e5e5;
      --accent: #0f4c81;
      --accent-light: #e8f0f8;
      --bg: #ffffff;
      --surface: #f8f8f6;
      --max-w: 680px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { font-family: var(--font); color: var(--text); background: var(--bg); line-height: 1.7; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    .nav { border-bottom: 1px solid var(--border); padding: 1rem 0; }
    .nav-inner { max-width: var(--max-w); margin: 0 auto; padding: 0 1.5rem;
                 display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-weight: 700; font-size: 1.1rem; color: var(--text); }
    .nav-links { display: flex; gap: 1.5rem; font-size: 0.9rem; }

    /* Hero */
    .hero { background: var(--accent); color: #fff; padding: 4rem 1.5rem; text-align: center; }
    .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 1rem; }
    .hero p { font-size: 1.1rem; opacity: 0.9; max-width: 500px; margin: 0 auto 2rem; }

    /* Subscribe form */
    .sub-form { display: flex; gap: 0.5rem; max-width: 420px; margin: 0 auto; }
    .sub-form input { flex: 1; padding: 0.75rem 1rem; border: none; border-radius: 6px;
                      font-size: 1rem; outline: none; }
    .sub-form button { padding: 0.75rem 1.5rem; background: #f0a500; color: #fff;
                       border: none; border-radius: 6px; font-weight: 600; cursor: pointer;
                       font-size: 1rem; white-space: nowrap; }
    .sub-form button:hover { background: #d4920a; }
    .sub-note { font-size: 0.8rem; opacity: 0.7; margin-top: 0.5rem; text-align: center; }

    /* Main */
    main { max-width: var(--max-w); margin: 0 auto; padding: 3rem 1.5rem; }

    /* Post cards */
    .post-grid { display: grid; gap: 2rem; }
    .post-card { border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem;
                 transition: border-color 0.2s; }
    .post-card:hover { border-color: var(--accent); }
    .post-card .tag { font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
                      letter-spacing: 0.05em; color: var(--accent); margin-bottom: 0.5rem; }
    .post-card h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .post-card h2 a { color: var(--text); }
    .post-card h2 a:hover { color: var(--accent); text-decoration: none; }
    .post-card .excerpt { color: var(--muted); font-size: 0.95rem; margin-bottom: 1rem; }
    .post-card .meta { font-size: 0.8rem; color: var(--muted); }

    /* Blog post */
    .post-header { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .post-header h1 { font-size: 2rem; line-height: 1.3; margin-bottom: 0.75rem; }
    .post-header .post-meta { color: var(--muted); font-size: 0.9rem; }
    .post-body { font-size: 1.05rem; }
    .post-body h2 { font-size: 1.4rem; margin: 2rem 0 0.75rem; }
    .post-body h3 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; }
    .post-body p { margin-bottom: 1rem; }
    .post-body ul, .post-body ol { margin: 0.5rem 0 1rem 1.5rem; }
    .post-body li { margin-bottom: 0.4rem; }
    .post-body blockquote { border-left: 3px solid var(--accent); padding-left: 1rem;
                            color: var(--muted); margin: 1.5rem 0; font-style: italic; }
    .post-body code { background: var(--surface); padding: 0.15em 0.4em;
                      border-radius: 3px; font-size: 0.9em; }
    .post-body pre { background: var(--surface); padding: 1rem; border-radius: 8px;
                     overflow-x: auto; margin-bottom: 1rem; }
    .post-body pre code { background: none; padding: 0; }

    /* Affiliate CTA */
    .affiliate-cta { background: var(--accent-light); border: 1px solid #c5d8ed;
                     border-radius: 10px; padding: 1.5rem; margin: 2rem 0; }
    .affiliate-cta h3 { color: var(--accent); margin-bottom: 0.5rem; }
    .affiliate-cta .cta-btn { display: inline-block; margin-top: 1rem; padding: 0.6rem 1.2rem;
                              background: var(--accent); color: #fff; border-radius: 6px;
                              font-weight: 600; font-size: 0.9rem; }
    .affiliate-cta .cta-btn:hover { text-decoration: none; background: #0a3d6b; }
    .affiliate-cta .disclosure { font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; }

    /* Footer */
    footer { border-top: 1px solid var(--border); padding: 2rem 1.5rem; text-align: center;
             color: var(--muted); font-size: 0.85rem; }

    @media (max-width: 600px) {
      .hero h1 { font-size: 1.6rem; }
      .sub-form { flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">{{ site.title }}</a>
      <div class="nav-links">
        <a href="/blog/">Blog</a>
        <a href="{{ site.substack_url }}">Newsletter</a>
        <a href="/about/">About</a>
      </div>
    </div>
  </nav>

  {{ content }}

  <footer>
    <p>© {{ site.time | date: "%Y" }} {{ site.title }} ·
       <a href="{{ site.substack_url }}">Subscribe</a> ·
       <a href="/feed.xml">RSS</a> ·
       <a href="/privacy/">Privacy</a></p>
    <p style="margin-top:0.5rem">Some links on this site are affiliate links. We may earn a commission at no extra cost to you.</p>
  </footer>

</body>
</html>
